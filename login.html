<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Login — JusticiaVial</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--jv-gray-50);padding:16px}
    .login-card{width:100%;max-width:400px;background:var(--jv-white);border:1px solid var(--jv-gray-200);border-radius:var(--radius-lg);padding:32px;box-shadow:var(--shadow-lg)}
    .login-logo{text-align:center;margin-bottom:24px}
    .login-logo-mark{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#1B3A5C,#2E86AB);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:700;font-family:var(--font-body)}
    .login-title{font-family:var(--font-display);font-size:22px;text-align:center;margin:12px 0 4px;color:var(--jv-black)}
    .login-sub{font-size:14px;color:var(--jv-gray-500);text-align:center;margin-bottom:24px}
    .login-error{background:var(--jv-danger-bg);color:var(--jv-danger-text);padding:10px 14px;border-radius:var(--radius-md);font-size:13px;margin-bottom:16px;display:none}
    .login-footer{text-align:center;margin-top:24px;padding-top:16px;border-top:1px solid var(--jv-gray-200)}
    .login-footer a{font-size:13px;color:var(--jv-teal);font-weight:500}
    .login-footer-text{font-size:12px;color:var(--jv-gray-400);margin-top:8px}
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-mark">JV</div>
        <div class="login-title">JusticiaVial</div>
        <div class="login-sub">Ingresá a tu panel de administración</div>
      </div>

      <div class="login-error" id="loginError"></div>
      <div class="login-error" id="loginInfo" style="background:#e0f2fe;color:#0369a1;display:none"></div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="loginEmail" placeholder="tu@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input type="password" class="form-input" id="loginPassword" placeholder="Tu contraseña" autocomplete="current-password">
      </div>

      <button class="btn btn-primary btn-block btn-lg" onclick="doLogin()" id="loginBtn" style="margin-top:16px">
        Ingresar
      </button>

      <div class="login-footer">
        <a href="#" onclick="resetPassword()">¿Olvidaste tu contraseña?</a>
        <div class="login-footer-text">Powered by JusticiaVial</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/api.js"></script>
  <script>
    async function doLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errorEl = document.getElementById('loginError');
      const btn = document.getElementById('loginBtn');

      if (!email || !password) {
        errorEl.textContent = 'Completá email y contraseña';
        errorEl.style.display = 'block';
        return;
      }

      errorEl.style.display = 'none';
      btn.textContent = 'Ingresando...';
      btn.disabled = true;

      const { data, error } = await JV_API.login(email, password);

      if (error) {
        let msg = 'Email o contraseña incorrectos. Verificá tus datos.';
        const raw = error.message || '';

        if (raw.includes('Email not confirmed')) {
          msg = '⚠️ Tu cuenta todavía no fue confirmada. Revisá tu bandeja de entrada y hacé clic en el link de confirmación que te enviamos. Si no lo encontrás, revisá spam o usá "¿Olvidaste tu contraseña?" para recibir un nuevo link.';
        } else if (raw.includes('Invalid login credentials')) {
          msg = 'Email o contraseña incorrectos. Verificá tus datos.';
        } else if (raw.includes('Too many requests') || raw.includes('rate limit')) {
          msg = 'Demasiados intentos fallidos. Esperá unos minutos antes de volver a intentar.';
        } else if (raw.includes('User not found')) {
          msg = 'No existe una cuenta con ese email.';
        } else if (raw) {
          msg = raw;
        }

        errorEl.textContent = msg;
        errorEl.style.display = 'block';
        btn.textContent = 'Ingresar';
        btn.disabled = false;
        return;
      }

      window.location.href = 'dashboard.html';
    }

    async function resetPassword() {
      const email = document.getElementById('loginEmail').value.trim();
      const errorEl = document.getElementById('loginError');
      const infoEl  = document.getElementById('loginInfo');
      if (!email) {
        errorEl.textContent = 'Escribí tu email primero y después hacé clic en "¿Olvidaste tu contraseña?"';
        errorEl.style.display = 'block';
        infoEl.style.display = 'none';
        return;
      }
      errorEl.style.display = 'none';
      const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      await sb.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/dashboard.html',
      });
      infoEl.textContent = '✉️ Si el email existe, te enviamos un link para restablecer tu contraseña. Revisá tu bandeja (y spam).';
      infoEl.style.display = 'block';
    }

    document.getElementById('loginPassword').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doLogin();
    });
    document.getElementById('loginEmail').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('loginPassword').focus();
    });

    (async () => {
      try {
        const session = await JV_API.getSession();
        if (session) window.location.href = 'dashboard.html';
      } catch(e) {}
    })();
  </script>
</body>
</html>
